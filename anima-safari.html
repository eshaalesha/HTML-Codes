<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        body {position : relative;}

        .safari-slide {height: 200px; text-align: center; padding-top: 75px; font-size: 1.8rem; color: white;}
        .safari-forest {background-color: darkcyan;}
        .safari-ocean {background-color: steelblue;}
        .safari-desert {background-color: orange;}
        .section {padding: 70px 20px; min-height:  300px;}
        #forest {background: honeydew;}
        #ocean {background: aliceblue;}
        #desert {background: lightyellow;}
    </style>
</head>
<body>
<div id="safariCarousel" class="carousel-slide" data-ride="carousel">
    <ol class="carousel-indicators">
        <li data-target="#safariCarousel" data-slide-to="0" class="active"></li>
        <li data-target="#safariCarousel" data-slide-to="1"></li>
        <li data-target="#safariCarousel" data-slide-to="2"></li>
    </ol>

    <div class="carousel-inner">
        <div class="carousel-item active safari-slide slide-forest">Forest safari</div>
        <div class="carousel-item active safari-slide slide-ocean">ocean safari</div>
        <div class="carousel-item active safari-slide slide-desert">Desert safari</div>
</div>

<a class="carousel-control-prev" href="#safariCarousel" data-slide="prev">
    <span class="carousel-control-prev-icon"></span>
</a>

<a class="carousel-control-next" href="#safariCarousel" data-slide="next">
    <span class="carousel-control-next-icon"></span>
</a>
</div>


<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
