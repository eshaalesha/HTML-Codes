<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: lightgreen;
            font-family: Arial, Helvetica, sans-serif;
        }

        .fact-file {
            background-color: lightyellow;
            color: darkslategray;
            width: 260px;
            padding: 25px;
            border: 20px solid forestgreen;
            margin: 30px;
        }

        .animal-name {
            color: forestgreen;
            font-size: 22px;
        }

        .detail {
            color: lightslategray;
        }

        .fun-fact {
            color: darkorange;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="fact-file">
        <h2 class="animal-name">snow leapard</h2>
        <p class="detail">type : big cat</p>
        <p class="detail">lives in : mountain ranges of central asia</p>
        <p class="detail">diet : deer , cat  ,whild sheeps</p>
        <h4 class="fun-fact">cool fact : can leap up to 15 meters in one
            jump!
        </h4>
    </div>
</body>
</html>
